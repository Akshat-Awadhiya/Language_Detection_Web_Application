<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Language Detection</h1>
        <p class="subtitle">Enter text below to detect its language.</p>
        <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>
        <button onclick="detectLanguage()">Detect Language</button>
        <div class="result">
            <h3>Predicted Language: <span id="result">-</span></h3>
        </div>
    </div>

 <script>
function detectLanguage() {

    // Get user input
    const text = document.getElementById("textInput").value.trim();

    // Validate input
    if (text === "") {
        alert("Please enter some text.");
        return;
    }

    // Show loading message
    document.getElementById("result").innerText = "Detecting...";

    // Send request to Flask backend
    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text
        })
    })
    .then(response => response.json())
    .then(data => {

        if (data.language) {
            document.getElementById("result").innerText = data.language;
        } else {
            document.getElementById("result").innerText = data.error || "Prediction failed";
        }

    })
    .catch(error => {
        console.error("Error:", error);
        document.getElementById("result").innerText = "Server Error";
    });
}
</script>
</body>
</html>
